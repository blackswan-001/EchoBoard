<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EchoBoard — Feedback System</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📣</text></svg>"/>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">📣</div>
    <span class="logo-text">Echo<span>Board</span></span>
  </a>
  <span class="header-badge">Live Feedback System</span>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<main>
<div class="container">

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card gold">
      <div class="stat-label">Total Entries</div>
      <div class="stat-value" id="stat-total">–</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Avg Rating</div>
      <div class="stat-value gold-text" id="stat-avg">–</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Positive</div>
      <div class="stat-value" id="stat-pos">–</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Negative</div>
      <div class="stat-value" id="stat-neg">–</div>
    </div>
  </div>

  <!-- Top row: Submit + Rating Distribution -->
  <div class="grid-2" style="margin-bottom:1.5rem">

    <!-- Submit Form -->
    <div class="card">
      <div class="card-header">
        <span class="icon">✏️</span>
        <h2>Submit Feedback</h2>
      </div>
      <div class="card-body">
        <form id="feedback-form" autocomplete="off">

          <div class="grid-2" style="gap:0.8rem">
            <div class="form-group">
              <label for="f-name">Name *</label>
              <input type="text" id="f-name" name="name" placeholder="Your name" required/>
            </div>
            <div class="form-group">
              <label for="f-email">Email</label>
              <input type="email" id="f-email" name="email" placeholder="optional"/>
            </div>
          </div>

          <div class="form-group">
            <label for="f-category">Category</label>
            <select id="f-category" name="category">
              <option value="General">General</option>
              <option value="Product">Product</option>
              <option value="Support">Support</option>
              <option value="Billing">Billing</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Rating *</label>
            <div class="stars">
              <input type="radio" name="rating" id="s5" value="5"/><label for="s5" title="5 stars">★</label>
              <input type="radio" name="rating" id="s4" value="4"/><label for="s4" title="4 stars">★</label>
              <input type="radio" name="rating" id="s3" value="3"/><label for="s3" title="3 stars">★</label>
              <input type="radio" name="rating" id="s2" value="2"/><label for="s2" title="2 stars">★</label>
              <input type="radio" name="rating" id="s1" value="1"/><label for="s1" title="1 star">★</label>
            </div>
          </div>

          <div class="form-group">
            <label for="f-message">Message *</label>
            <textarea id="f-message" name="message" placeholder="Share your experience…" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn">Submit Feedback</button>
        </form>
      </div>
    </div>

    <!-- Rating Distribution -->
    <div class="card">
      <div class="card-header">
        <span class="icon">📊</span>
        <h2>Rating Distribution</h2>
      </div>
      <div class="card-body">
        <div class="rating-bars" id="rating-bars">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Summary Panel -->
      <div class="card-header" style="margin-top:0; border-top:1px solid rgba(255,255,255,0.08)">
        <span class="icon">🔌</span>
        <h2>Feedback Summary</h2>
      </div>
      <div class="card-body">

        <!-- View toggle -->
        <div class="soap-tabs" style="margin-bottom:1rem">
          <button class="tab-btn active" id="tab-visual" onclick="switchSummaryTab('visual')">📋 Summary</button>
          <button class="tab-btn" id="tab-xml"           onclick="switchSummaryTab('xml')">XML</button>
          <button class="tab-btn" id="tab-json"          onclick="switchSummaryTab('json')">JSON</button>
        </div>

        <!-- Visual summary -->
        <div id="summary-visual">
          <div id="summary-rendered"><div class="spinner"></div></div>
        </div>

        <!-- Raw XML -->
        <div id="summary-xml" style="display:none">
          <div class="xml-output" id="soap-output">Loading…</div>
        </div>

        <!-- Raw JSON -->
        <div id="summary-json" style="display:none">
          <div class="xml-output" id="json-output">Loading…</div>
        </div>

      </div>
    </div>

  </div><!-- /grid-2 -->

  <!-- Feedback Feed -->
  <div class="card">
    <div class="card-header">
      <span class="icon">💬</span>
      <h2>All Feedback</h2>
    </div>
    <div class="card-body">
      <div class="filter-bar">
        <label style="margin:0;text-transform:none;font-size:0.85rem;color:var(--text-sub)">Filter:</label>
        <select id="cat-filter" style="width:auto">
          <option value="">All Categories</option>
          <option value="General">General</option>
          <option value="Product">Product</option>
          <option value="Support">Support</option>
          <option value="Billing">Billing</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="feedback-list" id="feedback-list">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

</div><!-- /container -->
</main>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="js/app.js"></script>
</body>
</html>
